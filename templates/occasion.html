<!--
  occasion.html – Reservation Step 1: Choose Occasion
-->
{% extends "layout.html" %}
{% block title %}Choose Occasion – {{ restaurant.name }} – DelishNex{% endblock %}

{% block content %}
<div class="step-page">
    <div class="container" style="max-width:700px;">
        <!-- Progress -->
        <div class="step-progress">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <div class="step-header animate-fadeInUp">
            <p class="text-muted mb-1">{{ restaurant.name }}</p>
            <h2>What's the Occasion?</h2>
            <p>Help us personalize your dining experience</p>
        </div>

        <form method="POST" action="{{ url_for('main.mood', restaurant_id=restaurant.id) }}" class="step-form">
            <input type="hidden" name="occasion" id="option-value" required>

            <div class="row g-3 mb-4">
                {% for occ in occasions %}
                <div class="col-md-4 col-6 animate-fadeInUp delay-{{ loop.index % 5 + 1 }}">
                    <div class="option-card" data-value="{{ occ.name }}">
                        <i class="fas {{ occ.icon }}" style="color:{{ occ.color }};"></i>
                        <h5>{{ occ.name }}</h5>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary-delish btn-lg">
                    Continue <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

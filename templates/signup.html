<!--
  signup.html – User Registration Page
  Handles new user signup with full client + server validation.
-->
{% extends "layout.html" %}
{% block title %}Sign Up – DelishNex{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card animate-fadeInUp">
        <!-- Logo -->
        <div class="auth-logo">
            <i class="fas fa-leaf"></i>
            <h2>Create Account</h2>
            <p class="text-muted">Join DelishNex and earn 100 welcome points!</p>
        </div>

        <!-- Signup Form -->
        <form method="POST" action="{{ url_for('main.signup') }}" id="signup-form">
            <div class="mb-3">
                <label for="full_name" class="form-label">Full Name</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-control" id="full_name" name="full_name"
                           placeholder="Enter your full name" required minlength="2" maxlength="120">
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="Enter your email" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-phone"></i>
                    <input type="tel" class="form-control" id="phone" name="phone"
                           placeholder="Enter your phone number" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Min 6 characters" required minlength="6">
                </div>
            </div>

            <div class="mb-4">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                           placeholder="Re-enter your password" required minlength="6">
                </div>
            </div>

            <button type="submit" class="btn btn-primary-delish w-100 mb-3">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>

            <div class="text-center">
                <p class="text-muted mb-0" style="font-size:0.9rem;">
                    Already have an account?
                    <a href="{{ url_for('main.login') }}" class="fw-bold">Sign In</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock %}

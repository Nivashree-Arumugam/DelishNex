<!--
  time.html – Reservation Step 4: Select Time
-->
{% extends "layout.html" %}
{% block title %}Select Time – {{ restaurant.name }} – DelishNex{% endblock %}

{% block content %}
<div class="step-page">
    <div class="container" style="max-width:700px;">
        <div class="step-progress">
            <div class="step-dot completed"></div>
            <div class="step-dot completed"></div>
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <div class="step-header animate-fadeInUp">
            <p class="text-muted mb-1">{{ restaurant.name }}</p>
            <h2>Pick a Time</h2>
            <p>Choose your preferred dining time</p>
        </div>

        <form method="POST" action="{{ url_for('main.members', restaurant_id=restaurant.id) }}" class="step-form">
            <input type="hidden" name="time" id="time-value" required>

            <div class="row g-2 mb-4">
                {% for slot in time_slots %}
                <div class="col-lg-2 col-md-3 col-4 animate-fadeInUp">
                    <div class="time-card" data-time="{{ slot }}">
                        <i class="fas fa-clock" style="color:var(--primary-muted); font-size:0.9rem;"></i>
                        <div style="font-weight:700; font-size:1rem; margin-top:4px;">{{ slot }}</div>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('main.select_date', restaurant_id=restaurant.id) }}" class="btn btn-outline-delish">
                    <i class="fas fa-arrow-left me-2"></i>Back
                </a>
                <button type="submit" class="btn btn-primary-delish btn-lg">
                    Continue <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

<!--
  index.html – Splash / Landing Page
  The first page users see before logging in.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DelishNex – AI Powered Smart Restaurant Reservation & Food Ordering System. Discover, reserve, and order in one seamless experience.">
    <title>DelishNex – Smart Dining Experience</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="splash-page">
        <div class="splash-content">
            <!-- Logo -->
            <div class="splash-logo animate-fadeInUp">
                <i class="fas fa-leaf"></i><br>
                DelishNex
            </div>

            <!-- Tagline -->
            <p class="splash-tagline animate-fadeInUp delay-1">
                AI-Powered Smart Dining Experience
            </p>

            <!-- Features -->
            <div class="splash-features animate-fadeInUp delay-2">
                <div class="splash-feature">
                    <i class="fas fa-brain"></i>
                    <span>AI Recommendations</span>
                </div>
                <div class="splash-feature">
                    <i class="fas fa-calendar-check"></i>
                    <span>Smart Reservations</span>
                </div>
                <div class="splash-feature">
                    <i class="fas fa-utensils"></i>
                    <span>Food Ordering</span>
                </div>
                <div class="splash-feature">
                    <i class="fas fa-trophy"></i>
                    <span>Reward Points</span>
                </div>
            </div>

            <!-- CTA Buttons -->
            <div class="animate-fadeInUp delay-3">
                <a href="{{ url_for('main.login') }}" class="btn btn-accent-delish btn-lg me-2 mb-2">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </a>
                <a href="{{ url_for('main.signup') }}" class="btn btn-outline-delish btn-lg mb-2" style="border-color:rgba(255,255,255,0.5); color:#fff;">
                    <i class="fas fa-user-plus me-2"></i>Sign Up
                </a>
            </div>

            <!-- Decorative -->
            <p class="mt-4 animate-fadeInUp delay-4" style="opacity:0.6; font-size:0.85rem;">
                Discover • Reserve • Dine • Enjoy
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
